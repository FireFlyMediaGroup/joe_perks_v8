name: E2E (money path)

# Browser money-path E2E against an ephemeral Neon branch (one throwaway DB per
# run, deleted at the end — never touches dev/prod data). Settlement is driven by
# signed Stripe test webhooks, so no live `stripe listen` tunnel is needed.
#
# Runs inside the official Playwright container image (browsers + all system libs
# prebaked) — so there is no `apt-get`/`--with-deps` step to stall on. The image
# tag must match the installed @playwright/test version.
#
# Required repository secrets:
#   NEON_API_KEY                          Neon API key with branch create/delete
#   NEON_PROJECT_ID                       Neon project id to branch from
#   STRIPE_TEST_SECRET_KEY                sk_test_… (create-intent)
#   STRIPE_TEST_WEBHOOK_SECRET            whsec_… used to sign the test webhook
#   NEXT_PUBLIC_STRIPE_TEST_PUBLISHABLE_KEY  pk_test_… (Stripe Elements)
#
# Runbook A.3 asks for 3 consecutive green runs before go-live.

on:
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 7 * * *" # nightly 07:00 UTC
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # never hang forever
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-jammy
    defaults:
      run:
        shell: bash # container default is sh; scripts use bash (pipefail, <<<)
    env:
      SKIP_ENV_VALIDATION: "true"
      SESSION_SECRET: ci-session-secret-0123456789abcdef0123456789abcdef
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_WEB_URL: http://localhost:3001
      STRIPE_SECRET_KEY: ${{ secrets.STRIPE_TEST_SECRET_KEY }}
      STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}
      NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_STRIPE_TEST_PUBLISHABLE_KEY }}
    steps:
      - name: Verify e2e secrets are configured
        run: |
          missing=""
          [ -z "${{ secrets.NEON_API_KEY }}" ] && missing="$missing NEON_API_KEY"
          [ -z "${{ secrets.NEON_PROJECT_ID }}" ] && missing="$missing NEON_PROJECT_ID"
          [ -z "${{ secrets.STRIPE_TEST_SECRET_KEY }}" ] && missing="$missing STRIPE_TEST_SECRET_KEY"
          [ -z "${{ secrets.STRIPE_TEST_WEBHOOK_SECRET }}" ] && missing="$missing STRIPE_TEST_WEBHOOK_SECRET"
          [ -z "${{ secrets.NEXT_PUBLIC_STRIPE_TEST_PUBLISHABLE_KEY }}" ] && missing="$missing NEXT_PUBLIC_STRIPE_TEST_PUBLISHABLE_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing required e2e secrets:$missing — add them in repo Settings → Secrets and variables → Actions, then re-run this workflow."
            exit 1
          fi

      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      # setup-bun needs `unzip`, which the Playwright image lacks. Safe in a fresh
      # container (no apt-lock daemon, unlike the host runner that stalled earlier).
      - name: Install unzip (for setup-bun)
        run: apt-get update && apt-get install -y --no-install-recommends unzip
      - uses: oven-sh/setup-bun@v2 # seed scripts run via `bun run`
      - run: pnpm install --frozen-lockfile

      - name: Create ephemeral Neon test branch
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          set -euo pipefail
          # Fork from `main` (matches the repo's committed migrations), never from
          # `dev` (extra migrations not in the repo). Parse with node (no jq in image).
          branches=$(curl -sf \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}")
          parent_id=$(node -e 'const d=JSON.parse(require("node:fs").readFileSync(0,"utf8"));const b=d.branches||[];const m=b.find(x=>x.name==="main")||b.find(x=>x.default);process.stdout.write(m&&m.id?m.id:"")' <<< "$branches")
          if [ -z "$parent_id" ]; then
            echo "Could not resolve a 'main'/default parent branch:"; echo "$branches"; exit 1
          fi
          resp=$(curl -sf -X POST \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "{\"branch\":{\"name\":\"ci-e2e-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}\",\"parent_id\":\"${parent_id}\"},\"endpoints\":[{\"type\":\"read_write\"}]}")
          branch_id=$(node -e 'const d=JSON.parse(require("node:fs").readFileSync(0,"utf8"));process.stdout.write((d.branch&&d.branch.id)||"")' <<< "$resp")
          db_url=$(node -e 'const d=JSON.parse(require("node:fs").readFileSync(0,"utf8"));const c=d.connection_uris||[];process.stdout.write((c[0]&&c[0].connection_uri)||"")' <<< "$resp")
          if [ -z "$db_url" ]; then
            echo "Failed to obtain a Neon connection URI from the branch response:"
            echo "$resp"
            exit 1
          fi
          echo "::add-mask::$db_url"
          echo "branch_id=$branch_id" >> "$GITHUB_OUTPUT"
          echo "db_url=$db_url" >> "$GITHUB_OUTPUT"

      - name: Apply migrations to the test branch
        working-directory: packages/db
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
        run: pnpm exec prisma migrate deploy

      - name: Run money-path e2e
        # The Playwright config seeds the branch (globalSetup) and builds+starts
        # `web` on :3100 (webServer); both inherit this env. Browsers are prebaked
        # in the container image, so no install step is needed.
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
        run: pnpm test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Delete ephemeral Neon branch
        if: always() && steps.neon.outputs.branch_id != ''
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
        run: |
          curl -sf -X DELETE \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${{ steps.neon.outputs.branch_id }}" \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            || echo "Neon branch delete failed (non-fatal; clean up manually if it lingers)"
